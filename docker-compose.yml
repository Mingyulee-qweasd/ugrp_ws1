services:
  ros2_humble:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: tb3_humble:latest
    container_name: ugrp_dev
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - RMW_IMPLEMENTATION=rmw_cyclonedds_cpp
      - TURTLEBOT3_MODEL=burger
      # GPU 렌더링 설정
      # Intel iGPU (드라이버 미지원) 노트북은 아래 두 줄 주석 해제
      # NVIDIA/AMD GPU 노트북은 아래 두 줄 주석 처리 유지
      # - LIBGL_ALWAYS_SOFTWARE=1
      # - GALLIUM_DRIVER=llvmpipe
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./ros2_ws:/ros2_ws
    network_mode: host
    privileged: true
    stdin_open: true
    tty: true
    restart: unless-stopped
